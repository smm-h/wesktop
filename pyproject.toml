[project]
name = "wesktop"
version = "0.2.0"
description = "A Python framework for building web-based desktop applications"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "smm-h", email = "smmh72@gmail.com"}]
keywords = ["desktop", "web", "gui", "pywebview", "granian", "asgi", "rlsbl"]
dependencies = [
    "granian>=2.7.4",
    "pywebview>=6.2.1",
    "msgspec>=0.21.1",
    "strictcli>=0.7.0",
]

[project.scripts]
wesktop = "wesktop.cli:main"

[dependency-groups]
dev = ["pytest", "httpx>=0.28"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wesktop"]

[tool.uv.sources]
strictcli = { path = "../strictcli/python", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
