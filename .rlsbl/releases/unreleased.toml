# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "Republish of the 0.8.x line: 0.8.0 never reached the registries due to a CI environment failure"
# Optional context explaining why these changes were made
context = """
0.8.0 completed its git side (tag and GitHub Release) but the CI-gated publish
refused because pytest flaked on GitHub runners: the search_files tests invoke
ripgrep, which the CI workflow never installed and whose presence on runners is
inconsistent. CI now installs ripgrep before pytest, so the search_files tests
pass deterministically. 0.8.0 remains a git-tag-only release with no registry
artifacts; 0.8.1 publishes the 0.8.x line to PyPI and npm.
"""
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
# Set to true to generate a blog post for this release
# blog = false
include = ["pypi", "npm"]
exclude = []
