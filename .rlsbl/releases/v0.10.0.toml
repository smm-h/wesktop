# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "minor"
# Short description of this release (required)
description = "Cross-process window lifecycle with per-window marker refcounting (fixes the shared-server kill bug), configurable second-launch behavior, a startup handshake with runtime config injection, and a native runtime bridge."
# Optional context explaining why these changes were made
context = """
This release builds on fastware 0.5.0's instance registry and presence-marker
API to make multi-process desktop apps behave correctly.

Previously, when two launches shared one background server, closing the last
window in one process stopped the server even though another process still had a
window open. Window lifecycles are now refcounted across processes via per-window
marker files in the fastware instance registry; the server stops only when the
last live window (in any process) closes, with dead PIDs pruned by liveness.

`wesktop.run(..., second_open=...)` makes second-launch behavior an explicit
choice: `"new-window"` (default) opens another window on the running server, or
`"focus-existing"` drops a platform-neutral file-based focus request and exits so
the running window is raised -- no DBus, no AppleEvents.

New windows run a startup handshake against `/__fastware/version` (a loud stderr
error if it is unreachable or malformed, with the window staying open) and inject
`window.__wesktop = {buildId, port, appName}` after page load (best-effort,
retried once). `list_app_instances()` enumerates the app's live server and open
windows. A host-side native runtime bridge reacts to fastware build changes.
"""
